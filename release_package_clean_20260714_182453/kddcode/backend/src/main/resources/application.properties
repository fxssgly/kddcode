server.port=5000

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/bigData?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

kdd.use-mysql=${USE_MYSQL:false}
kdd.python-command=${KDD_PYTHON:python}
kdd.python-script=python/kdd_algorithms.py
