# 文件作用：Spring Boot 后端运行配置。
# 项目位置：backend/src/main/resources，应用启动时 Spring Boot 会自动读取。
# 交互关系：这里决定服务端口、数据库连接、是否启用 MySQL，以及 Java 调用 Python 时使用的命令和脚本路径。

# 后端 HTTP 端口，前端开发服务器会把 /api 请求代理到这个端口。
server.port=5000

# MySQL 连接配置。冒号后面的值是默认值，环境变量存在时会优先使用环境变量。
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/bigdata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库暂时不可用时不让连接池启动失败，方便课堂演示先使用 CSV 数据。
spring.datasource.hikari.initialization-fail-timeout=0

# 不让 Hibernate 自动建表，表结构由 database/init_mysql.sql 管理。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# KDD 业务配置：是否启用 MySQL、Python 命令以及算法入口脚本路径。
kdd.python-command=${KDD_PYTHON:E:/Develop/Anaconda/python.exe}
kdd.python-script=python/kdd_algorithms.py
